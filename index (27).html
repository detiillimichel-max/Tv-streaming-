<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>OIO TV Player</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E50914">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <header class="navbar">
            <div class="logo"><i class="fa-solid fa-play" style="color: #E50914;"></i> OIO TV</div>
            <div class="nav-actions">
                <button id="btn-search"><i class="fa-solid fa-search"></i></button>
                <button id="btn-profile"><i class="fa-solid fa-user-circle"></i></button>
            </div>
        </header>

        <!-- HERO CARROSSEL 5 BANNERS - Edge Functions -->
        <section id="hero" class="hero">
            <div class="hero-slides" id="hero-slides">
                <!-- Slides injetados via JS - 5 banners Edge -->
                <div class="hero-slide active" style="background-image:url('https://images.unsplash.com/photo-1534447677768-be436bb09401?w=1200')">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <span class="badge">OIO Originals • Destaque</span>
                        <h1>Cyber Odyssey 2026</h1>
                        <p>Carregando banners da sua Edge Function TMDB...</p>
                        <div class="hero-buttons">
                            <button class="btn-primary"><i class="fa-solid fa-play"></i> Assistir</button>
                            <button class="btn-secondary"><i class="fa-solid fa-info-circle"></i> Detalhes</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="hero-dots" id="hero-dots"></div>
            <div class="hero-status" id="hero-status">● CONECTANDO EDGE FUNCTIONS</div>
            <button class="hero-arrow prev" id="hero-prev"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="hero-arrow next" id="hero-next"><i class="fa-solid fa-chevron-right"></i></button>
        </section>

        <main class="content-rows" id="content-container">
            <!-- 5 por aba - render instantâneo -->
        </main>

        <div id="player-modal" class="modal hidden">
            <div class="modal-content">
                <button id="modal-close"><i class="fa-solid fa-times"></i></button>
                <div class="player-wrapper" id="player-container"></div>
                <div class="modal-info">
                    <h2 id="modal-title">Titulo</h2>
                    <p id="modal-desc">Descricao</p>
                    <div class="player-meta" id="player-meta"></div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-tab="home"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a href="#" class="nav-item" data-tab="filmes"><i class="fa-solid fa-film"></i><span>Filmes</span></a>
            <a href="#" class="nav-item" data-tab="series"><i class="fa-solid fa-tv"></i><span>Series</span></a>
            <a href="#" class="nav-item" data-tab="infantil"><i class="fa-solid fa-child"></i><span>Desenhos</span></a>
            <a href="#" class="nav-item" data-tab="minha-lista"><i class="fa-solid fa-heart"></i><span>Lista</span></a>
        </nav>
    </div>
    <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
    <script src="script.js"></script>
</body>
</html>
